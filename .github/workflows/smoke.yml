name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NODE_ENV: production
      DATABASE_URL: postgresql://smoke:smoke@localhost:5432/smoke
      SESSION_SECRET: smoke-ci-secret-not-real-padding-x
      PORT: 8080
      DISABLE_CRONS: "true"
      SKIP_QDRANT_BULK_SYNC: "true"
      DISABLE_DEFERRED: "true"
      OPENROUTER_API_KEY: "sk-smoke-not-real"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: smoke
          POSTGRES_PASSWORD: smoke
          POSTGRES_DB: smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: R1 - No import.meta.url + process.argv guards in server/
        run: |
          if rg 'import\.meta\.url.*process\.argv' server/; then
            echo "✗ Found import.meta.url + process.argv guard — esbuild collapses module URLs in bundles. Use PROCESS_ENV gate instead."
            exit 1
          fi
          echo "✓ R1 passed"

      - name: R2 - No bare process.exit in server/ (outside allowed files)
        run: |
          MATCHES=$(rg --with-filename 'process\.exit\(' server/ \
            | grep -v '^server/index\.ts:' \
            | grep -v '^server/seeds/' \
            | grep -v '^server/env-validator\.ts:' \
            || true)
          if [ -n "$MATCHES" ]; then
            echo "✗ Bare process.exit() found outside allowed files:"
            echo "$MATCHES"
            exit 1
          fi
          echo "✓ R2 passed"

      - name: Build
        run: npm run build

      - name: Boot smoke test (512 MB cap, DISABLE_DEFERRED=true)
        run: |
          # Boot under 512 MB — 16× headroom below Railway Hobby 8 GB limit.
          # If boot OOMs here it would definitely OOM in prod.
          node --max-old-space-size=512 dist/index.js &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

          # Wait up to 30s for /healthz to respond
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/healthz 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ /healthz returned 200 after ${i}s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "✗ /healthz never returned 200 within 30s (last status: $STATUS)"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

          # Verify response body contains expected fields
          BODY=$(curl -sf http://localhost:8080/healthz)
          echo "healthz T+boot response: $BODY"
          echo "$BODY" | grep -q '"status"' || (echo "✗ Missing status field" && kill $SERVER_PID 2>/dev/null || true && exit 1)
          UPTIME_1=$(echo "$BODY" | grep -o '"uptimeSec":[0-9]*' | grep -o '[0-9]*')
          echo "uptimeSec at T+boot: $UPTIME_1"

          # Wait 30s then verify same PID is running and uptime has incremented
          sleep 30

          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "✗ Server process $SERVER_PID exited during 30s wait — silent exit bug detected"
            exit 1
          fi

          BODY2=$(curl -sf http://localhost:8080/healthz)
          echo "healthz T+30s response: $BODY2"
          UPTIME_2=$(echo "$BODY2" | grep -o '"uptimeSec":[0-9]*' | grep -o '[0-9]*')
          echo "uptimeSec at T+30s: $UPTIME_2"

          if [ -z "$UPTIME_2" ] || [ "$UPTIME_2" -le "${UPTIME_1:-0}" ]; then
            echo "✗ uptimeSec did not increment (was $UPTIME_1, now $UPTIME_2) — process may have restarted"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi

          echo "✓ Server still alive after 30s, uptimeSec incremented ($UPTIME_1 → $UPTIME_2)"
          kill $SERVER_PID 2>/dev/null || true
          echo "✓ Boot smoke test passed"
